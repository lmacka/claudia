# claudia Helm values — single-tenant, single-user-per-deploy.

displayName: ""               # required: e.g. "Liam"
dob: ""                       # required: ISO date e.g. "1985-02-14"
country: "AU"                 # affects timezone

theme: sage                   # sage | blush | lavender | amber | contrast

# v0.8: credentials are captured in the in-app setup wizard (/setup/1 for
# the Anthropic key, /setup/2 for the password). Helm Secrets are only
# needed when you want to bootstrap from an externally-managed source
# (SOPS, Vault, etc) — leave the blocks below commented out for a
# normal install. When set, env-mounted values WIN over /settings edits
# so the UI fields render read-only.

# anthropicSecretRef:        # OPTIONAL — set if you want the API key from a Helm Secret
#   name: anthropic-api-key
#   key: api-key

integrations:
  google:                     # Gmail + Google Calendar tools.
    enabled: false            # opt-in; default off.
    # secretRef:              # OPTIONAL — credentials come from /settings if not set here
    #   name: google-oauth
    #   clientIdKey: client-id
    #   clientSecretKey: client-secret

# basicAuth — OPTIONAL: the user picks their password in /setup/2.
# basicAuth:
#   passwordSecretRef:
#     name: claudia-auth
#     key: password

model:
  primary: claude-sonnet-4-6

pvc:
  size: 10Gi
  storageClassName: ""                # empty = cluster default

ingress:
  enabled: true
  host: ""                            # required: e.g. claudia.example.com
  className: ""                       # empty = cluster default
  annotations: {}                     # cert-manager / nginx hints
  tls:
    enabled: true
    secretName: ""                    # required if tls.enabled

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

image:
  repository: ghcr.io/lmacka/claudia
  tag: ""                             # defaults to chart appVersion if empty
  pullPolicy: IfNotPresent
  pullSecrets: []                     # e.g. [ { name: ghcr-pull } ] for private registry

# nameOverride: ""                    # overrides app name (default: chart name)
# fullnameOverride: ""                # overrides full resource name
