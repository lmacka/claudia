# claudia Helm values — see docs/design.md "Helm chart values" section
# IMMUTABLE post-install: mode, encryption settings.

mode: adult                   # adult | kid — IMMUTABLE post-install

displayName: ""               # required: e.g. "Liam" or "Jasper"
dob: ""                       # required: ISO date e.g. "1985-02-14"; age computed
country: "AU"                 # affects timezone and crisis hotlines

theme: sage                   # sage | blush | lavender | amber | contrast

anthropicSecretRef:
  name: anthropic-api-key
  key: api-key

# adult-mode-only block. Ignored when mode=kid.
adult:
  integrations:
    google:                   # Gmail + Google Calendar tools.
      enabled: false          # opt-in; default off. Kid mode never honours this.
      secretRef:              # only consulted when enabled=true
        name: google-oauth
        clientIdKey: client-id
        clientSecretKey: client-secret

basicAuth:
  passwordSecretRef:
    name: claudia-auth
    key: password             # adult: chat password; kid: parent-admin password

# kid-mode-only block — ignored when mode=adult
kid:
  parentDisplayName: "your parent"    # default; the parent overrides this in /setup or /settings (per-deploy, persists to /data/parent_display_name.txt)
  safety:
    haiku_classifier: true            # NON-DISABLEABLE per values.schema.json
    no_anthropomorphism: true         # forbids "I miss you" / streaks / romance
    session_nudge_minutes: [60, 90]   # "you've been chatting a while"
  encryption:
    enabled: true                     # at-rest encryption with kid passphrase

model:
  primary: claude-sonnet-4-6
  classifier: claude-haiku-4-5

pvc:
  size: 10Gi
  storageClassName: ""                # empty = cluster default

ingress:
  enabled: true
  host: ""                            # required: e.g. claudia.example.com
  className: ""                       # empty = cluster default
  gatewayApi: false                   # true = render HTTPRoute (Gateway API); false = Ingress (default per /plan-eng-review D6)
  parentRef:                          # used only when gatewayApi=true
    name: ""                          # e.g. "internal-gateway"
    namespace: ""                     # gateway namespace, if different
    sectionName: ""                   # listener name on the gateway, e.g. "https"
  annotations: {}                     # cert-manager / nginx hints
  tls:
    enabled: true
    secretName: ""                    # required if tls.enabled (Ingress only; HTTPRoute uses listener TLS)

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

image:
  repository: ghcr.io/lmacka/claudia
  tag: ""                             # defaults to chart appVersion if empty
  pullPolicy: IfNotPresent
  pullSecrets: []                     # e.g. [ { name: ghcr-pull } ] for private registry

# nameOverride: ""                    # overrides app name (default: chart name)
# fullnameOverride: ""                # overrides full resource name
