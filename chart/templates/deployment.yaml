apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claudia.fullname" . }}
  labels:
    {{- include "claudia.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "claudia.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "claudia.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: claudia
          image: {{ include "claudia.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: CLAUDIA_OPS_MODE
              value: prod
            - name: CLAUDIA_DATA_ROOT
              value: /data
            - name: CLAUDIA_DEFAULT_MODEL
              value: {{ .Values.model.primary | quote }}
            - name: CLAUDIA_DISPLAY_NAME
              value: {{ .Values.displayName | quote }}
            - name: CLAUDIA_DOB
              value: {{ .Values.dob | quote }}
            - name: CLAUDIA_COUNTRY
              value: {{ .Values.country | quote }}
            - name: CLAUDIA_THEME
              value: {{ .Values.theme | quote }}
            - name: CLAUDIA_INGRESS_HOST
              value: {{ .Values.ingress.host | quote }}
            - name: CLAUDIA_INTEGRATIONS_GOOGLE_ENABLED
              value: {{ ((.Values.integrations).google).enabled | default false | quote }}
            {{- /* Optional Helm Secret bootstraps. Otherwise the in-app /setup
                wizard captures credentials. Env-mounted values stay
                authoritative when present. */}}
            {{- if .Values.anthropicSecretRef }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.anthropicSecretRef.name }}
                  key: {{ .Values.anthropicSecretRef.key }}
            {{- end }}
            {{- if and .Values.basicAuth (.Values.basicAuth).passwordSecretRef }}
            - name: BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.basicAuth.passwordSecretRef.name }}
                  key: {{ .Values.basicAuth.passwordSecretRef.key }}
            {{- end }}
            {{- if and ((.Values.integrations).google).enabled (((.Values.integrations).google).secretRef) }}
            - name: GOOGLE_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.integrations.google.secretRef.name }}
                  key: {{ .Values.integrations.google.secretRef.clientIdKey | default "client-id" }}
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.integrations.google.secretRef.name }}
                  key: {{ .Values.integrations.google.secretRef.clientSecretKey | default "client-secret" }}
            - name: GOOGLE_OAUTH_REDIRECT_URI
              value: "https://{{ .Values.ingress.host }}/oauth/callback"
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "claudia.fullname" . }}-data
