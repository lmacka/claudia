apiVersion: v1
kind: Service
metadata:
  name: {{ include "claudia.fullname" . }}
  labels:
    {{- include "claudia.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    {{- include "claudia.selectorLabels" . | nindent 4 }}
