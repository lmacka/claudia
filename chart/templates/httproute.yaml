{{- if and .Values.ingress.enabled .Values.ingress.gatewayApi -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "claudia.fullname" . }}
  labels:
    {{- include "claudia.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ required "ingress.parentRef.name is required when ingress.gatewayApi=true" .Values.ingress.parentRef.name }}
      {{- with .Values.ingress.parentRef.namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .Values.ingress.parentRef.sectionName }}
      sectionName: {{ . }}
      {{- end }}
  hostnames:
    - {{ .Values.ingress.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "claudia.fullname" . }}
          port: 80
{{- end }}
