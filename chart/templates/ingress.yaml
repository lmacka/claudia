{{- if and .Values.ingress.enabled (not .Values.ingress.gatewayApi) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "claudia.fullname" . }}
  labels:
    {{- include "claudia.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.secretName }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "claudia.fullname" . }}
                port:
                  name: http
{{- end }}
