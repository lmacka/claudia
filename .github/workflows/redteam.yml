name: redteam

# Kid-mode safety floor: 50-scenario red-team suite + Haiku judge.
# Fires only on PRs (or main pushes) that touch the prompt or safety
# code, because the suite costs ~$0.50/run. See docs/safety.md
# "Red-team v1 ship criteria" and tests/test_redteam.py.
#
# Requires the ANTHROPIC_API_KEY secret to be set on the repo.

on:
  push:
    branches: [main]
    paths:
      - "app/prompts/**"
      - "app/safety.py"
      - "tests/redteam_scenarios.yaml"
      - "tests/test_redteam.py"
      - ".github/workflows/redteam.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/prompts/**"
      - "app/safety.py"
      - "tests/redteam_scenarios.yaml"
      - "tests/test_redteam.py"
      - ".github/workflows/redteam.yml"

permissions:
  contents: read

jobs:
  redteam:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run red-team suite
        env:
          RUN_REDTEAM: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret not set — skipping red-team suite."
            echo "::warning::Set the secret in repo settings → Secrets and variables → Actions."
            exit 0
          fi
          uv run pytest tests/test_redteam.py -v --tb=short
