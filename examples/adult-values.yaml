# Example values for a claudia deploy.
#
# All credentials are captured in the in-app /setup wizard the first time
# you open the URL. No Secrets need to exist before you `helm install`.
#
# Pre-requisites:
#   - A Kubernetes cluster with an Ingress controller installed.
#   - DNS pointing claudia.example.com (or your chosen host) at the cluster.
#
# Install:
#   helm install claudia oci://ghcr.io/lmacka/claudia \
#     --version 0.9.0 \
#     --values examples/adult-values.yaml \
#     --namespace claudia --create-namespace
#
# Then visit https://claudia.example.com/ in a browser. You'll be walked
# through 5 setup steps (Anthropic API key, password, profile, library,
# recap) before reaching the chat.
#
# OPTIONAL — pre-bootstrap from Helm Secrets instead of the wizard.
# Useful for SOPS/Vault-managed secrets. When set, env-mounted values
# WIN over /settings edits so the UI fields render read-only.
#
#   anthropicSecretRef:
#     name: anthropic-api-key
#     key: api-key
#   basicAuth:
#     passwordSecretRef:
#       name: claudia-auth
#       key: password

displayName: "Liam"
dob: "1985-02-14"
country: "AU"

theme: sage

# Gmail + Calendar tools are OFF by default. Toggle in /settings after
# completing setup, OR pre-configure here:
# integrations:
#   google:
#     enabled: true
#     secretRef:           # OPTIONAL — credentials can also come from /settings
#       name: google-oauth
#       clientIdKey: client-id
#       clientSecretKey: client-secret

model:
  primary: claude-sonnet-4-6

pvc:
  size: 10Gi
  # storageClassName: ""    # leave empty to use cluster default

ingress:
  enabled: true
  host: claudia.example.com    # CHANGE ME to your DNS
  # className: nginx           # set if your cluster has multiple Ingress controllers
  tls:
    enabled: true
    secretName: claudia-tls    # cert-manager Certificate or pre-created Secret

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
