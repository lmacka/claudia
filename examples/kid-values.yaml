# Example values for a kid-mode claudia deploy.
#
# Kid-mode safety floor is non-disableable per chart/values.schema.json:
# the haiku_classifier, write_tools_disabled, no_anthropomorphism, and
# encryption.enabled settings cannot be turned off via values overrides.
# This is intentional. See docs/design.md "Premise 3" and Premise 4.
#
# Pre-requisites:
#   1. A Kubernetes cluster with an Ingress controller.
#   2. Two Secrets in the target namespace:
#        kubectl create secret generic anthropic-api-key --from-literal=api-key=sk-ant-...
#        kubectl create secret generic claudia-jasper-auth --from-literal=password='parent-admin-password'
#
#   IMPORTANT: This is the parent-admin password (used to log into /admin).
#   The kid sets their own passphrase at first login.
#
# Then:
#   helm install claudia-jasper oci://ghcr.io/lmacka/claudia \
#     --version 0.1.0 \
#     --values examples/kid-values.yaml \
#     --namespace claudia-jasper --create-namespace
#
# After install, browse to https://<your-host>/admin to set up the kid's profile.

mode: kid

displayName: "Jasper"
dob: "2010-08-22"
country: "AU"

theme: sage

anthropicSecretRef:
  name: anthropic-api-key
  key: api-key

basicAuth:
  passwordSecretRef:
    name: claudia-jasper-auth
    key: password

# Google OAuth is intentionally NOT enabled in kid mode.
# Gmail send and calendar create are disabled per the kid-mode safety floor.

kid:
  parentDisplayName: "your dad"     # or "your mum" / "your parents" — what claudia calls the deployer when talking to the kid
  safety:
    haiku_classifier: true          # NON-DISABLEABLE
    write_tools_disabled: true      # NON-DISABLEABLE
    no_anthropomorphism: true       # NON-DISABLEABLE
    session_nudge_minutes: [60, 90] # tunable; v1 ships with two nudges
  encryption:
    enabled: true                   # NON-DISABLEABLE in kid mode

model:
  primary: claude-sonnet-4-6
  classifier: claude-haiku-4-5

pvc:
  size: 10Gi

ingress:
  enabled: true
  host: claudia-jasper.example.com   # CHANGE ME
  tls:
    enabled: true
    secretName: claudia-jasper-tls

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
