# Example values for a kid-mode claudia deploy.
#
# v1 DEV MODE: NO at-rest encryption. Sessions are stored as plaintext
# JSONL on the PVC. Anyone with `kubectl exec` access to the pod can
# read kid session content. Do NOT promise privacy on v1 deploys.
# Encryption returns at Step 11 — see docs/build-plan-v1.md.
#
# The classifier (runtime) and no-anthropomorphism (prompt) floor IS
# enforced. Gmail+Calendar tools are gated at the registry — kid mode
# never registers them, regardless of any config. encryption.enabled is
# a default-true flag the app currently ignores; it will be re-pinned
# to const: true at v1.5 via schema migration.
#
# Pre-requisites:
#   1. A Kubernetes cluster with an Ingress controller.
#   2. Two Secrets in the target namespace:
#        kubectl create secret generic anthropic-api-key --from-literal=api-key=sk-ant-...
#        kubectl create secret generic claudia-jasper-auth --from-literal=password='parent-admin-password'
#
#   IMPORTANT: This is the parent-admin password (used to log into /admin).
#   The kid sets their own passphrase at first login.
#
# Then:
#   helm install claudia-jasper oci://ghcr.io/lmacka/claudia \
#     --version 0.1.0 \
#     --values examples/kid-values.yaml \
#     --namespace claudia-jasper --create-namespace
#
# After install, browse to https://<your-host>/admin to set up the kid's profile.

mode: kid

displayName: "Jasper"
dob: "2010-08-22"
country: "AU"

theme: sage

anthropicSecretRef:
  name: anthropic-api-key
  key: api-key

basicAuth:
  passwordSecretRef:
    name: claudia-jasper-auth
    key: password

# Google OAuth is intentionally unavailable in kid mode.
# Gmail and Calendar tools are gated at the app's tool registry — even
# if Google OAuth env vars somehow leaked into a kid pod, the tools
# would never register. See app/main.py:_google_enabled.

kid:
  parentDisplayName: "your dad"     # or "your mum" / "your parents" — what claudia calls the deployer when talking to the kid
  safety:
    haiku_classifier: true          # NON-DISABLEABLE
    no_anthropomorphism: true       # NON-DISABLEABLE
    session_nudge_minutes: [60, 90] # tunable; v1 ships with two nudges
  encryption:
    enabled: false                  # v1 dev mode: app does not encrypt. v1.5 restores this.

model:
  primary: claude-sonnet-4-6
  classifier: claude-haiku-4-5

pvc:
  size: 10Gi

ingress:
  enabled: true
  host: claudia-jasper.example.com   # CHANGE ME
  tls:
    enabled: true
    secretName: claudia-jasper-tls

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
